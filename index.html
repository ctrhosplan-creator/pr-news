<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#eef2f8;
}

/* ฟอร์ม */

.formbox{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:8px;
margin-bottom:10px;
}

button{
padding:10px 20px;
border:none;
background:#0a7a43;
color:white;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

/* โปสเตอร์ */

.poster{
width:794px;
height:1123px;
margin:auto;
background-image:url('bg.jpg');
background-size:cover;
background-position:center;
position:relative;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* header */

.header{
position:absolute;
top:60px;
left:80px;
display:flex;
align-items:center;
}

.logo{
width:100px;
margin-right:15px;
}

/* เนื้อหา */

.content{
position:absolute;
top:260px;
left:120px;
right:120px;
text-align:center;
color:#0b5e34;
}

.topic{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.date{
font-size:20px;
margin-bottom:20px;
}

.detail{
font-size:20px;
line-height:1.8;
background:rgba(255,255,255,0.6);
padding:20px;
border-radius:12px;
}

/* รูปภาพ */

.gallery{
position:absolute;
top:520px;
left:120px;
right:120px;

display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.gallery img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

/* footer */

.footer{
position:absolute;
bottom:25px;
left:50px;
font-size:14px;
color:#0a5d35;
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

หน่วยงาน
<input id="dept">

วันที่
<input id="date">

รายละเอียด
<textarea id="detail"></textarea>

อัปโหลดรูปกิจกรรม
<input type="file" id="images" multiple>

<br><br>

<button onclick="generate()">สร้างข่าว</button>
<button onclick="saveImage()">บันทึกรูป</button>

</div>


<div id="poster" class="poster">

<div class="header">
<img src="moph.png" class="logo">
</div>

<div class="content">

<div id="showDept" class="topic"></div>
<div id="showDate" class="date"></div>
<div id="showDetail" class="detail"></div>

</div>

<div id="gallery" class="gallery"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>


<script>

function generate(){

document.getElementById("showDept").innerText =
"หน่วยงาน : " + document.getElementById("dept").value

document.getElementById("showDate").innerText =
"วันที่ " + document.getElementById("date").value

document.getElementById("showDetail").innerText =
document.getElementById("detail").value


const gallery=document.getElementById("gallery")
gallery.innerHTML=""

const files=document.getElementById("images").files

for(let i=0;i<files.length;i++){

const reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result
gallery.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}


function saveImage(){

html2canvas(document.querySelector("#poster")).then(canvas=>{

let link=document.createElement("a")
link.download="pr-news.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
