<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>จดหมายข่าวโรงพยาบาลจัตุรัส</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
background:#eef2f6;
margin:0;
padding:20px;
}

.formbox{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.news{
width:800px;
background:white;
margin:auto;
padding:20px;
}

.banner{
background:#f4f6ff;
padding:15px;
display:flex;
align-items:center;
gap:15px;
}

.banner img{
height:70px;
}

.banner h1{
margin:0;
color:#3b2bb3;
}

.subtitle{
color:#555;
}

.title{
text-align:center;
color:#2e7d32;
font-size:26px;
font-weight:bold;
margin:20px 0;
}

.meta{
display:flex;
justify-content:space-between;
border-bottom:3px solid #2e7d32;
padding-bottom:10px;
margin-bottom:10px;
}

.content{
line-height:1.6;
}

.images{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.images img{
width:100%;
border-radius:6px;
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าว</h3>

<label>หัวข้อข่าว</label>
<input id="title">

<label>วันที่</label>
<input type="date" id="date">

<label>หน่วยงาน</label>
<input id="dept" placeholder="เช่น งานประชาสัมพันธ์">

<label>เนื้อข่าว</label>
<textarea id="detail"></textarea>

<label>รูปภาพ (สูงสุด 4 รูป)</label>
<input type="file" id="images" multiple>

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">ดาวน์โหลด JPG</button>

</div>


<div id="news" class="news">

<div class="banner">

<img src="moph.png">

<div>
<h1>จดหมายข่าวประชาสัมพันธ์</h1>
<div class="subtitle">
โรงพยาบาลจัตุรัส<br>
Chatturat Hospital
</div>
</div>

</div>

<div class="title" id="showtitle"></div>

<div class="meta">

<div>📅 วันที่ : <span id="showdate"></span></div>

<div>👥 หน่วยงาน : <span id="showdept"></span></div>

</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

</div>

<script>

function generate(){

showtitle.innerText = title.value
showdate.innerText = date.value
showdept.innerText = dept.value
showdetail.innerText = detail.value

let files = images.files

showimages.innerHTML=""

for(let i=0;i<files.length && i<4;i++){

let reader = new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result
showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#news"),{scale:3}).then(canvas=>{

let link=document.createElement("a")
link.download="news.jpg"
link.href=canvas.toDataURL("image/jpeg")
link.click()

})

}

</script>

</body>
</html>
