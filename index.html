<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<style>

body{
font-family:"Sarabun",sans-serif;
background:#eef2f7;
margin:0;
}

/* HEADER */

.header{
background:linear-gradient(120deg,#0d47a1,#1976d2,#42a5f5);
color:white;
padding:30px;
display:flex;
align-items:center;
gap:20px;
}

.header img{
height:70px;
}

.header h1{
margin:0;
font-size:24px;
}

.subtitle{
font-size:14px;
}

/* FORM */

.form{
background:white;
max-width:900px;
margin:20px auto;
padding:20px;
border-radius:6px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 16px;
background:#1976d2;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:5px;
}

/* RESULT */

#result{
background:white;
max-width:900px;
margin:20px auto;
padding:30px;
border-radius:6px;
}

.title{
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.date{
text-align:right;
margin-bottom:20px;
}

/* IMAGE LAYOUT */

.gallery-main img{
width:100%;
height:350px;
object-fit:cover;
border-radius:6px;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:8px;
}

.gallery-grid img{
width:100%;
height:120px;
object-fit:cover;
border-radius:4px;
}

/* MOBILE */

@media(max-width:700px){

.gallery-grid{
grid-template-columns:repeat(2,1fr);
}

}

/* PRINT */

@page{
size:A4;
margin:1.5cm;
}

@media print{

.form{
display:none;
}

}

</style>
</head>

<body>

<div class="header">

<img src="moph.png">

<div>
<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>
<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>
</div>

</div>

<div class="form">

<label>หน่วยงาน</label>
<input id="dept">

<label>รายละเอียดข่าว</label>
<textarea id="detail"></textarea>

<label>อัปโหลดรูป (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple>

<button onclick="generate()">สร้างข่าว</button>
<button onclick="window.print()">Export A4</button>

</div>

<div id="result"></div>

<script>

function thaiDate(){

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date()

return "วันที่ "+d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543)

}

function generate(){

let dept=document.getElementById("dept").value
let title=document.getElementById("title").value
let detail=document.getElementById("detail").value
let files=document.getElementById("images").files

let html=""

html+="<div class='title'>"+title+"</div>"
html+="<div class='date'>"+thaiDate()+"</div>"

html+="<b>"+dept+"</b><br><br>"+detail

/* MAIN IMAGE */

if(files.length>0){

let main=URL.createObjectURL(files[0])

html+="<div class='gallery-main'>"
html+="<img src='"+main+"'>"
html+="</div>"

}

/* GRID IMAGES */

if(files.length>1){

html+="<div class='gallery-grid'>"

for(let i=1;i<files.length && i<9;i++){

let url=URL.createObjectURL(files[i])

html+="<img src='"+url+"'>"

}

html+="</div>"

}

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
