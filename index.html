```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PR Generator PRO</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
background:#eef5f1;
padding:20px;
}

/* FORM */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#0a8f55;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
}

/* POSTER */

.poster{
width:794px;
min-height:1123px;
margin:auto;
background:white;
border-radius:10px;
overflow:hidden;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,.2);
padding-bottom:80px;
}

/* HEADER */

.header{
background:linear-gradient(120deg,#0f6d3d,#1fa463,#79d38a);
color:white;
padding:40px;
display:flex;
gap:20px;
align-items:center;
position:relative;
}

.header img{
height:80px;
}

.header h1{
margin:0;
font-size:28px;
}

.subtitle{
font-size:15px;
opacity:.9;
}

/* TITLE */

.titlebar{
background:#006c3c;
color:white;
font-size:28px;
font-weight:bold;
padding:10px 25px;
}

/* META */

.meta{
text-align:center;
padding:10px;
color:#006c3c;
}

#showdept{
font-size:20px;
font-weight:bold;
}

/* CONTENT */

.content{
padding:20px 30px;
font-size:18px;
text-align:center;
white-space:pre-line;
}

/* IMAGES */

.images{
display:grid;
gap:10px;
padding:20px;
}

.images img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#006c3c,#0a8f55);
color:white;
text-align:center;
padding:12px;
position:absolute;
bottom:0;
width:100%;
}

</style>
</head>

<body>

<div class="formbox">

<h3>สร้างข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input id="dept">

<label>วันที่กิจกรรม</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail"></textarea>

<label>โลโก้หน่วยงาน</label>
<input type="file" id="logo" accept="image/*">

<label>รูปภาพกิจกรรม</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">📥 บันทึกรูป</button>

</div>

<div id="poster" class="poster">

<div class="header">

<img id="showlogo" src="moph.png">

<div>
<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>
<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>
</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">
<div id="showdept"></div>
<div id="showdate"></div>
</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<script>

function formatThaiDate(dateStr){

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

return "วันที่ "+d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543)

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)
showdetail.innerText=detail.value

/* โลโก้ */

if(logo.files[0]){
let r=new FileReader()
r.onload=e=>showlogo.src=e.target.result
r.readAsDataURL(logo.files[0])
}

/* รูปภาพ */

let files=images.files

showimages.innerHTML=""

let col=3

if(files.length==1) col=1
else if(files.length==2) col=2
else if(files.length<=4) col=2
else col=3

showimages.style.gridTemplateColumns="repeat("+col+",1fr)"

for(let i=0;i<files.length && i<9;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result
showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{
scale:4
}).then(canvas=>{

let link=document.createElement("a")
link.download="PR.jpg"
link.href=canvas.toDataURL("image/jpeg",1)
link.click()

})

}

</script>

</body>
</html>
```
