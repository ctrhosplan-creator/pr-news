<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#eef2f8;
}

/* ฟอร์ม */

.formbox{
background:white;
padding:20px;
border-radius:8px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
}

button{
padding:10px 20px;
border:none;
background:#0a7a43;
color:white;
border-radius:5px;
cursor:pointer;
}

/* โปสเตอร์ */

.poster{
width:794px;
height:1123px;
margin:auto;
background-image:url('bg.jpg');
background-size:cover;
background-position:center;
position:relative;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* header */

.header{
position:absolute;
top:40px;
left:40px;
display:flex;
align-items:center;
}

.logo{
width:90px;
margin-right:15px;
}

.title{
font-size:28px;
font-weight:bold;
color:#0b5e34;
}

.subtitle{
font-size:18px;
color:#0b5e34;
}

/* เนื้อหา */

.content{
position:absolute;
top:250px;
left:80px;
right:80px;
text-align:center;
}

.topic{
font-size:26px;
font-weight:bold;
color:#0a5d35;
margin-bottom:10px;
}

.date{
font-size:18px;
margin-bottom:20px;
}

.detail{
font-size:18px;
line-height:1.6;
}

/* footer */

.footer{
position:absolute;
bottom:20px;
left:40px;
font-size:14px;
color:#0a5d35;
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

หน่วยงาน
<input id="dept">

วันที่
<input id="date">

รายละเอียด
<textarea id="detail"></textarea>

<button onclick="generate()">สร้างข่าว</button>
<button onclick="saveImage()">บันทึกรูป</button>

</div>


<div id="poster" class="poster">

<div class="header">
<img src="moph.png" class="logo">
<div>
<div class="title">โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</div>
<div class="subtitle">จดหมายข่าวประชาสัมพันธ์</div>
</div>
</div>

<div class="content">

<div id="showDept" class="topic"></div>
<div id="showDate" class="date"></div>
<div id="showDetail" class="detail"></div>

</div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<script>

function generate(){

document.getElementById("showDept").innerText=
"หน่วยงาน : "+document.getElementById("dept").value

document.getElementById("showDate").innerText=
"วันที่ "+document.getElementById("date").value

document.getElementById("showDetail").innerText=
document.getElementById("detail").value

}

function saveImage(){

html2canvas(document.querySelector("#poster")).then(canvas=>{

var link=document.createElement("a")
link.download="news.png"
link.href=canvas.toDataURL()
link.click()

})

}

</script>

</body>
</html>
