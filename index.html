<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
background:#edf1f7;
margin:0;
padding:20px;
}

/* form */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#1565c0;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

/* poster */

.poster{
width:900px;
margin:auto;
background:white;
}

/* header */

.header{
background:linear-gradient(90deg,#0d47a1,#1e88e5);
color:white;
padding:20px;
display:flex;
align-items:center;
gap:15px;
}

.header img{
height:80px;
}

.header h1{
margin:0;
font-size:28px;
}

.subtitle{
font-size:14px;
opacity:.9;
}

/* title */

.titlebar{
background:#0d47a1;
color:white;
font-size:32px;
font-weight:bold;
padding:10px 20px;
}

/* images */

.images{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.images img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

/* date */

.date{
text-align:center;
font-size:26px;
font-weight:bold;
color:#0d47a1;
padding:10px;
}

/* content */

.content{
padding:0 40px 30px 40px;
font-size:18px;
line-height:1.7;
text-align:center;
}

/* footer */

.footer{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
font-size:16px;
}

</style>

</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>วันที่กิจกรรม</label> <input type="text" id="date" placeholder="เช่น วันพุธ ที่ 6 พฤศจิกายน 2567 เวลา 09.30 - 12.00 น.">

<label>รายละเอียดข่าว</label>

<textarea id="detail" rows="4"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label> <input type="file" id="images" multiple>

<button onclick="generate()">สร้างข่าว</button> <button onclick="download()">ดาวน์โหลด JPG</button>

</div>

<div id="poster" class="poster">

<div class="header">

<img src="moph.png">

<div>
<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="images" id="showimages"></div>

<div class="date" id="showdate"></div>

<div class="content" id="showdetail"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<script>

function generate(){

showdate.innerText=date.value
showdetail.innerText=detail.value

let files=images.files

showimages.innerHTML=""

for(let i=0;i<files.length && i<9;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result

showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{scale:3}).then(canvas=>{

let link=document.createElement("a")
link.download="ข่าวประชาสัมพันธ์.jpg"
link.href=canvas.toDataURL("image/jpeg")
link.click()

})

}

</script>

</body>
</html>
