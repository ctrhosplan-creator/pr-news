```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#eef5f1;
}

/* ===== FORM ===== */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#0a8f55;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
font-size:16px;
}

/* ===== POSTER ===== */

.poster{
width:794px;
min-height:1123px;
margin:auto;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
padding-bottom:80px;
}

/* ===== HEADER ===== */

.header{
background:linear-gradient(120deg,#0f6d3d,#1fa463,#79d38a);
color:white;
padding:45px 35px;
display:flex;
align-items:center;
gap:25px;
position:relative;
overflow:hidden;
}

.header::before{
content:"";
position:absolute;
right:-120px;
top:-90px;
width:500px;
height:260px;
background:rgba(255,255,255,0.15);
border-radius:50%;
}

.header::after{
content:"";
position:absolute;
left:-140px;
bottom:-120px;
width:420px;
height:220px;
background:rgba(255,255,255,0.08);
border-radius:50%;
}

.header img{
height:80px;
z-index:2;
}

.header-text{
z-index:2;
}

.header h1{
margin:0;
font-size:30px;
}

.subtitle{
font-size:15px;
opacity:.95;
margin-top:5px;
max-width:500px;
}

/* ===== TITLE ===== */

.titlebar{
background:#006c3c;
color:white;
font-size:28px;
font-weight:bold;
padding:10px 25px;
}

/* ===== META ===== */

.meta{
text-align:center;
padding:10px;
color:#006c3c;
}

#showdept{
font-size:20px;
font-weight:bold;
}

#showdate{
font-size:18px;
margin-top:5px;
}

/* ===== CONTENT ===== */

.content{
padding:10px 25px 20px 25px;
font-size:18px;
line-height:1.6;
text-align:center;
white-space:pre-line;
}

/* ===== IMAGES ===== */

.images{
display:grid;
gap:12px;
padding:20px;
}

.images img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

/* ===== FOOTER ===== */

.footer{
background:linear-gradient(90deg,#006c3c,#0a8f55);
color:white;
padding:12px;
text-align:center;
font-size:15px;
position:absolute;
bottom:0;
left:0;
width:100%;
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่กิจกรรม</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail" rows="4"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">📥 บันทึกรูปลงมือถือ</button>

</div>

<div id="poster" class="poster">

<div class="header">

<img src="moph.png">

<div class="header-text">

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">
<div id="showdept"></div>
<div id="showdate"></div>
</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<script>

function formatThaiDate(dateStr){

if(!dateStr) return ""

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return "วันที่ "+day+" "+month+" "+year

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)
showdetail.innerText=detail.value

let files=images.files

if(files.length>9){
alert("อัปโหลดได้ไม่เกิน 9 รูป")
return
}

showimages.innerHTML=""

/* Layout รูปอัตโนมัติ */

let col=3

if(files.length==1){
col=1
}
else if(files.length==2){
col=2
}
else if(files.length<=4){
col=2
}
else{
col=3
}

showimages.style.gridTemplateColumns="repeat("+col+",1fr)"

for(let i=0;i<files.length && i<9;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result

showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{
scale:4,
useCORS:true
}).then(canvas=>{

let link=document.createElement("a")
link.download="ข่าวประชาสัมพันธ์.jpg"
link.href=canvas.toDataURL("image/jpeg",1)

link.click()

})

}

</script>

</body>
</html>
```
