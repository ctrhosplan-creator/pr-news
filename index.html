```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#e8f1ed;
}

/* ฟอร์ม */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#0a8f55;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
font-size:16px;
}

/* โปสเตอร์ */

.poster{
width:794px;
min-height:1123px;
margin:auto;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
padding-bottom:90px;
}

/* HEADER */

.header{
background:
linear-gradient(135deg,#0b6b3a,#1fa463),
url("https://www.transparenttextures.com/patterns/cubes.png");
color:white;
padding:50px 30px;
display:flex;
align-items:center;
gap:20px;
}

.header img{
height:80px;
}

.header h1{
margin:0;
font-size:30px;
}

.subtitle{
font-size:15px;
opacity:.9;
}

/* แถบข่าว */

.titlebar{
background:#0b6b3a;
color:white;
font-size:26px;
font-weight:bold;
padding:12px 25px;
}

/* meta */

.meta{
text-align:center;
padding:10px;
color:#0b6b3a;
}

#showdept{
font-size:20px;
font-weight:bold;
}

#showdate{
font-size:18px;
margin-top:5px;
}

/* เนื้อข่าว */

.content{
padding:15px 30px;
font-size:18px;
line-height:1.7;
text-align:center;
white-space:pre-line;
}

/* รูป */

.images{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:20px;
}

.images img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

/* footer */

.footer{
background:linear-gradient(90deg,#0b6b3a,#1fa463);
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
position:absolute;
bottom:0;
width:100%;
}

.footer-right{
display:flex;
align-items:center;
gap:12px;
}

.facebook{
background:#1877f2;
padding:6px 14px;
border-radius:20px;
font-weight:bold;
}

.qr{
width:70px;
background:white;
padding:4px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่กิจกรรม</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail" rows="4"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">📥 บันทึกรูปโปสเตอร์</button>

</div>

<div id="poster" class="poster">

<div class="header">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Seal_of_the_Ministry_of_Public_Health_of_Thailand.svg/512px-Seal_of_the_Ministry_of_Public_Health_of_Thailand.svg.png">

<div>

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">

<div id="showdept"></div>
<div id="showdate"></div>

</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">

<div>
www.ctrhos.go.th | โทร 044-851499
</div>

<div class="footer-right">

<div class="facebook">
Facebook
</div>

<img src="qrcode.png" class="qr">

</div>

</div>

</div>

<script>

function formatThaiDate(dateStr){

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

return "วันที่ "+d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543)

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)
showdetail.innerText=detail.value

let files=images.files

showimages.innerHTML=""

for(let i=0;i<files.length && i<9;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result
showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{
scale:4
}).then(canvas=>{

let link=document.createElement("a")

link.download="ข่าวประชาสัมพันธ์.jpg"
link.href=canvas.toDataURL("image/jpeg")

link.click()

})

}

</script>

</body>
</html>
```
