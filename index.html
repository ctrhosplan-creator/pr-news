```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#eef2f6;
}

/* FORM */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#0a8f55;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
font-size:16px;
margin-right:10px;
}

/* POSTER */

.poster{
width:794px;
margin:auto;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
}

/* HEADER */

.header{
background:linear-gradient(120deg,#0a6b3c,#38b26f);
color:white;
padding:40px;
display:flex;
align-items:center;
gap:20px;
}

.header img{
height:70px;
}

.header h1{
margin:0;
font-size:28px;
}

.subtitle{
font-size:14px;
opacity:.9;
}

/* TITLE */

.titlebar{
background:#0a6b3c;
color:white;
padding:12px 25px;
font-size:24px;
font-weight:bold;
}

/* META */

.meta{
text-align:center;
padding:15px;
color:#0a6b3c;
}

#showdept{
font-size:20px;
font-weight:bold;
}

#showdate{
font-size:18px;
}

/* CONTENT */

.content{
padding:0 40px 20px 40px;
text-align:center;
font-size:18px;
line-height:1.7;
white-space:pre-line;
}

/* IMAGES */

.images{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:20px;
}

.images img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#0a6b3c,#1fa463);
color:white;
padding:12px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.facebook{
background:#1877f2;
padding:6px 14px;
border-radius:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่กิจกรรม</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail" rows="4"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">บันทึกรูปโปสเตอร์</button>

</div>

<div id="poster" class="poster">

<div class="header">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/66/Seal_of_the_Ministry_of_Public_Health_of_Thailand.svg/512px-Seal_of_the_Ministry_of_Public_Health_of_Thailand.svg.png">

<div>

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">

<div id="showdept"></div>
<div id="showdate"></div>

</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">

<div>
www.ctrhos.go.th | โทร 044-851499
</div>

<div class="facebook">
Facebook
</div>

</div>

</div>

<script>

function formatThaiDate(dateStr){

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

return "วันที่ "+d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543)

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)
showdetail.innerText=detail.value

let files=images.files
showimages.innerHTML=""

for(let i=0;i<files.length && i<9;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result
showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{
scale:4
}).then(canvas=>{

let link=document.createElement("a")
link.download="ข่าวประชาสัมพันธ์.jpg"
link.href=canvas.toDataURL("image/jpeg")

link.click()

})

}

</script>

</body>
</html>
```
