```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
background:#eef2f1;
padding:20px;
}

/* FORM */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#0b6b3a;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

/* POSTER */

.poster{
width:794px;
height:1123px;
margin:auto;
position:relative;
border-radius:12px;
overflow:hidden;
background:white;
}

/* พื้นหลัง */

.bg{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
object-fit:cover;
z-index:0;
}

/* วันที่ */

.newsdate{
position:absolute;
top:163px;
left:55%;
transform:translateX(-50%);
font-size:34px;
font-weight:bold;
color:white;
text-shadow:0 2px 5px rgba(0,0,0,0.4);
z-index:2;
}

/* หน่วยงาน */

.dept{
position:absolute;
top:235px;
left:50%;
transform:translateX(-50%);
font-size:25px;
font-weight:bold;
color:black;
z-index:2;
}

/* เนื้อข่าว */

.content{
position:absolute;
top:275px;
left:80px;
right:80px;
z-index:2;
}

/* รายละเอียด */

.detail{
font-size:18px;
line-height:1.9;
margin-bottom:25px;
text-align:justify;
}

.detail p{
margin:0;
text-indent:50px;
}

/* รูปภาพ */

.images{
display:grid;
gap:12px;
}

.images img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.images.single img{
height:420px;
aspect-ratio:1/1;
}

/* FOOTER */

.footer{
position:absolute;
bottom:35px;
left:0;
right:0;
text-align:center;
font-size:10px;
font-weight:bold;
color:black;
z-index:2;
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail" rows="5"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">📥 บันทึกโปสเตอร์</button>

</div>

<div id="poster" class="poster">

<img src="bg.png" class="bg">

<div class="newsdate" id="showdate"></div>

<div class="dept" id="showdept"></div>

<div class="content">

<div class="detail" id="showdetail"></div>

<div class="images" id="showimages"></div>

</div>

<div class="footer">
Website : www.ctr.go.th | Tel. 044851499
</div>

</div>

<script>

const dept=document.getElementById("dept")
const date=document.getElementById("date")
const detail=document.getElementById("detail")
const images=document.getElementById("images")

const showdept=document.getElementById("showdept")
const showdate=document.getElementById("showdate")
const showdetail=document.getElementById("showdetail")
const showimages=document.getElementById("showimages")

function formatThaiDate(dateStr){

if(!dateStr) return ""

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

return "วันที่ "+d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543)

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)

let text=detail.value.replace(/\n/g,"<br><br>")
showdetail.innerHTML="<p>"+text+"</p>"

let files=images.files

if(files.length>9){
alert("อัปโหลดได้ไม่เกิน 9 รูป")
return
}

showimages.innerHTML=""
showimages.classList.remove("single")

let count=files.length

if(count==1){
showimages.style.gridTemplateColumns="1fr"
showimages.classList.add("single")
}
else if(count==2){
showimages.style.gridTemplateColumns="1fr 1fr"
}
else if(count==3){
showimages.style.gridTemplateColumns="1fr 1fr 1fr"
}
else if(count==4){
showimages.style.gridTemplateColumns="1fr 1fr"
}
else{
showimages.style.gridTemplateColumns="1fr 1fr 1fr"
}

for(let i=0;i<count;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result
showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

/* รอให้รูปโหลดก่อนแคป */

function waitImagesLoad(container){

const imgs=container.querySelectorAll("img")

return Promise.all([...imgs].map(img=>{
if(img.complete) return Promise.resolve()
return new Promise(resolve=>{img.onload=img.onerror=resolve})
}))

}

/* DOWNLOAD */

async function download(){

const poster=document.getElementById("poster")

await waitImagesLoad(poster)

html2canvas(poster,{
scale:3,
useCORS:true
}).then(canvas=>{

let img=canvas.toDataURL("image/jpeg",1)

let link=document.createElement("a")
link.href=img
link.download="poster-news.jpg"

document.body.appendChild(link)
link.click()
document.body.removeChild(link)

})

}

</script>

</body>
</html>
```
