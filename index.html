```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

/* ===== BODY ===== */

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#eef5f1;
}

/* ===== FORM ===== */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#0a8f55;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
font-size:16px;
}

/* ===== POSTER ===== */

.poster{
width:794px;
height:1123px;
margin:auto;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
position:relative;
}

/* ===== HEADER ===== */

.header{
background:linear-gradient(90deg,#1c7a45,#2ea85e,#7ac96d);
color:white;
padding:40px 30px;
display:flex;
align-items:center;
gap:20px;
position:relative;
overflow:hidden;
}

.header:before{
content:"";
position:absolute;
right:-120px;
top:-80px;
width:520px;
height:260px;
background:rgba(255,255,255,0.18);
border-radius:50%;
}

.header:after{
content:"";
position:absolute;
left:-150px;
bottom:-120px;
width:480px;
height:240px;
background:rgba(255,255,255,0.10);
border-radius:50%;
}

.shape{
position:absolute;
width:120%;
height:80px;
background:rgba(255,255,255,0.12);
transform:rotate(-5deg);
top:70px;
left:-40px;
}

.dots{
position:absolute;
right:70px;
top:40px;
width:170px;
height:100px;
background-image:radial-gradient(rgba(255,255,255,0.7) 2px, transparent 2px);
background-size:18px 18px;
opacity:.7;
}

.header img{
height:75px;
z-index:2;
}

.header-text{
z-index:2;
}

.header h1{
margin:0;
font-size:28px;
font-weight:bold;
}

.subtitle{
font-size:15px;
opacity:.95;
}

/* ===== TITLE ===== */

.titlebar{
background:#006c3c;
color:white;
font-size:28px;
font-weight:bold;
padding:10px 25px;
}

/* ===== META ===== */

.meta{
text-align:center;
padding:10px;
color:#006c3c;
}

#showdept{
font-size:20px;
font-weight:bold;
}

#showdate{
font-size:18px;
margin-top:5px;
}

/* ===== CONTENT ===== */

.content{
padding:10px 25px 20px 25px;
font-size:18px;
line-height:1.6;
text-align:center;
white-space:pre-line;
}

/* ===== IMAGES ===== */

.images{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.images img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

/* ===== FOOTER ===== */

.footer{
background:linear-gradient(90deg,#006c3c,#0a8f55);
color:white;
padding:12px;
text-align:center;
font-size:15px;
position:absolute;
bottom:0;
width:100%;
}

</style>
</head>

<body>

<!-- ===== FORM ===== -->

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่กิจกรรม</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">📥 บันทึกรูปลงมือถือ</button>

</div>

<!-- ===== POSTER ===== -->

<div id="poster" class="poster">

<div class="header">

<div class="shape"></div>
<div class="dots"></div>

<img src="moph.png">

<div class="header-text">

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>
</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">
<div id="showdept"></div>
<div id="showdate"></div>
</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<!-- ===== SCRIPT ===== -->

<script>

function formatThaiDate(dateStr){

if(!dateStr) return ""

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return "วันที่ "+day+" "+month+" "+year

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)
showdetail.innerText=detail.value

let files=images.files

showimages.innerHTML=""

for(let i=0;i<files.length && i<9;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result

showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{
scale:5
}).then(canvas=>{

canvas.toBlob(function(blob){

let url = URL.createObjectURL(blob)

let a = document.createElement("a")
a.href = url
a.download = "ข่าวประชาสัมพันธ์.jpg"

document.body.appendChild(a)
a.click()

document.body.removeChild(a)
URL.revokeObjectURL(url)

})

})

}

</script>

</body>
</html>
```
