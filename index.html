<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#eef3fb;
}

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#1565c0;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
cursor:pointer;
}

.poster{
width:900px;
margin:auto;
background:white;
border-radius:10px;
overflow:hidden;
}

/* banner */

.header{

background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,.2),transparent 40%),
radial-gradient(circle at 80% 20%,rgba(255,255,255,.15),transparent 40%),
linear-gradient(120deg,#0d47a1,#1976d2,#42a5f5);

color:white;
padding:30px;
display:flex;
align-items:center;
gap:20px;
position:relative;
overflow:hidden;
}

.header img{
height:85px;
}

.header h1{
margin:0;
font-size:30px;
}

.subtitle{
font-size:14px;
opacity:.9;
}

/* title */

.titlebar{
background:#0d47a1;
color:white;
font-size:32px;
font-weight:bold;
padding:12px 30px;
}

/* meta */

.meta{
text-align:center;
font-size:18px;
padding:10px;
color:#0d47a1;
}

.date{
font-size:22px;
font-weight:bold;
}

.dept{
font-size:20px;
margin-top:5px;
}

/* content */

.content{
padding:0 40px 20px 40px;
font-size:18px;
line-height:1.7;
text-align:center;
}

/* images */

.images{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
padding:20px;
}

.images img{
width:100%;
height:220px;
object-fit:cover;
border-radius:6px;
}

/* footer */

.footer{
background:linear-gradient(90deg,#1e88e5,#42a5f5);
color:white;
padding:15px;
text-align:center;
font-size:16px;
}

</style>

</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าว</h3>

<label>หน่วยงาน</label> <input type="text" id="dept" placeholder="เช่น งานประชาสัมพันธ์">

<label>วันที่กิจกรรม</label> <input type="date" id="date">

<label>รายละเอียดข่าว</label>

<textarea id="detail"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label> <input type="file" id="images" multiple>

<button onclick="generate()">สร้างข่าว</button> <button onclick="download()">ดาวน์โหลด JPG</button>

</div>

<div id="poster" class="poster">

<div class="header">

<img src="moph.png">

<div>

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">

<div class="dept" id="showdept"></div>

<div class="date" id="showdate"></div>

</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<script>

function formatThaiDate(dateStr){

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return "วันที่ "+day+" "+month+" "+year

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value

showdate.innerText=formatThaiDate(date.value)

showdetail.innerText=detail.value

let files=images.files

showimages.innerHTML=""

for(let i=0;i<files.length && i<9;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")

img.src=e.target.result

showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{scale:3}).then(canvas=>{

let link=document.createElement("a")

link.download="ข่าวประชาสัมพันธ์.jpg"

link.href=canvas.toDataURL("image/jpeg")

link.click()

})

}

</script>

</body>
</html>
