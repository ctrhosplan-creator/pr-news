<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<style>

/* ====== Page ====== */

body{
font-family: "Sarabun", sans-serif;
background:#f4f6fb;
margin:0;
padding:0;
}

/* ====== A4 Banner ====== */

.a4-banner{
width:100%;
max-width:1200px;
margin:auto;
}

.a4-banner img{
width:100%;
height:auto;
display:block;
}

/* ====== Header ====== */

.header{
background:linear-gradient(120deg,#0d47a1,#1976d2,#42a5f5);
color:white;
padding:30px;
display:flex;
align-items:center;
gap:20px;
}

.header img{
height:70px;
}

.header h1{
margin:0;
font-size:24px;
}

.subtitle{
font-size:14px;
opacity:.9;
}

/* ====== Form ====== */

.form{
padding:20px;
background:white;
max-width:900px;
margin:auto;
margin-top:20px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
}

input, textarea{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:10px 16px;
background:#1976d2;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-right:6px;
}

/* ====== Result ====== */

#result{
background:white;
max-width:900px;
margin:20px auto;
padding:30px;
border-radius:6px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.title{
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.date{
text-align:right;
margin-bottom:20px;
}

/* ====== Image Grid ====== */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

/* ====== Print A4 ====== */

@page{
size:A4;
margin:1.5cm;
}

@media print{

body{
background:white;
}

.form{
display:none;
}

#a4-banner{
display:none;
}

}

</style>
</head>

<body>

<!-- ====== Banner ====== -->

<div class="a4-banner" id="a4-banner">
<img src="banner-pr-news.png" alt="PR Banner">
</div>

<!-- ====== Header ====== -->

<div class="header">

<img src="moph.png">

<div>
<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>
<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>
</div>

</div>

<!-- ====== Form ====== -->

<div class="form">

<label>หน่วยงาน</label>
<input id="dept">

<label>หัวข้อข่าว</label>
<input id="title">

<label>รายละเอียดข่าว</label>
<textarea id="detail" rows="5"></textarea>

<label>อัปโหลดรูปภาพ (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple>

<button onclick="generate()">สร้างข่าว</button>
<button onclick="window.print()">Export / Print A4</button>

</div>

<!-- ====== Result ====== -->

<div id="result"></div>

<script>

/* ===== Thai Date ===== */

function thaiDate(){

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date()

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return "วันที่ "+day+" "+month+" "+year

}

/* ===== Generate News ===== */

function generate(){

let dept=document.getElementById("dept").value
let title=document.getElementById("title").value
let detail=document.getElementById("detail").value
let files=document.getElementById("images").files

let html=""

html+="<div class='title'>"+title+"</div>"
html+="<div class='date'>"+thaiDate()+"</div>"

html+="<b>หน่วยงาน : "+dept+"</b><br><br>"
html+=detail

html+="<div class='gallery'>"

for(let i=0;i<files.length && i<9;i++){

let url=URL.createObjectURL(files[i])

html+="<img src='"+url+"'>"

}

html+="</div>"

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
