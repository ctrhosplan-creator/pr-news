<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:20px;
background:#eef2f8;
}

/* ฟอร์ม */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
margin-bottom:25px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#1565c0;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
font-size:16px;
}

/* A4 */

.poster{
width:794px;
min-height:1123px;
margin:auto;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

/* HEADER */

.header{
background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);
color:white;
padding:30px;
display:flex;
align-items:center;
gap:20px;
position:relative;
overflow:hidden;
}

.header img{
height:80px;
z-index:2;
}

.header h1{
margin:0;
font-size:26px;
}

.subtitle{
font-size:14px;
opacity:.9;
}

/* TITLE */

.titlebar{
background:#0d47a1;
color:white;
font-size:30px;
font-weight:bold;
padding:12px;
text-align:center;
}

/* META */

.meta{
text-align:center;
padding:15px;
color:#0d47a1;
}

#showdept{
font-size:22px;
font-weight:bold;
}

#showdate{
font-size:18px;
margin-top:5px;
}

/* CONTENT */

.content{
padding:10px 40px 20px 40px;
font-size:19px;
line-height:1.8;
text-align:left;
white-space:pre-line;
}

/* IMAGES */

.images{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
padding:25px;
}

.images img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* FOOTER */

.footer{
background:linear-gradient(90deg,#1e88e5,#42a5f5);
color:white;
padding:15px;
text-align:center;
font-size:16px;
}

/* MOBILE */

@media(max-width:900px){

.poster{
width:100%;
}

.images{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่กิจกรรม</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail" rows="6"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">ดาวน์โหลด JPG</button>

</div>

<div id="poster" class="poster">

<div class="header">

<img src="moph.png">

<div>

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">

<div id="showdept"></div>
<div id="showdate"></div>

</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<script>

function formatThaiDate(dateStr){

if(!dateStr) return ""

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return "วันที่ "+day+" "+month+" "+year

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value

showdate.innerText=formatThaiDate(date.value)

let text = detail.value

text = text.replace(/^- /gm,"• ")

showdetail.innerText = text

let files=images.files

if(files.length>9){
alert("เลือกรูปได้ไม่เกิน 9 รูป")
return
}

showimages.innerHTML=""

for(let i=0;i<files.length;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result

showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{
scale:5
}).then(canvas=>{

let link=document.createElement("a")

link.download="ข่าวประชาสัมพันธ์.jpg"

link.href=canvas.toDataURL("image/jpeg",1)

link.click()

})

}

</script>

</body>
</html>
