<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
background:#eef2f1;
padding:20px;
}

/* FORM */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#0b6b3a;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
}

/* POSTER */

.poster{
width:794px;
height:1123px;
margin:auto;
background:url("bg.png") no-repeat center;
background-size:cover;
position:relative;
border-radius:12px;
overflow:hidden;
}

/* วันที่ */

.newsdate{
position:absolute;
top:163px;
left:55%;
transform:translateX(-50%);
font-size:34px;
font-weight:bold;
color:white;
text-shadow:0 2px 5px rgba(0,0,0,0.4);
}

/* หน่วยงาน */

.dept{
position:absolute;
top:235px;
left:50%;
transform:translateX(-50%);
font-size:25px;
font-weight:bold;
color:black;
}

/* เนื้อข่าว */

.content{
position:absolute;
top:275px;
left:80px;
right:80px;
}

/* รายละเอียด */

.detail{
font-size:18px;
line-height:1.9;
margin-top:13px;
margin-bottom:25px;
text-align:justify;
word-break:break-word;
}

.detail p{
margin:0 0 12px 0;
text-indent:50px;
}

/* รูป */

.images{
display:grid;
gap:12px;
}

.images img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

/* FOOTER */

.footer{
position:absolute;
bottom:35px;
left:0;
right:0;
text-align:center;
font-size:18px;
font-weight:bold;
color:white;
text-shadow:0 2px 5px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail" rows="5"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">📥 บันทึกรูป</button>

</div>


<div id="poster" class="poster">

<div class="newsdate" id="showdate"></div>

<div class="dept" id="showdept"></div>

<div class="content">

<div class="detail" id="showdetail"></div>

<div class="images" id="showimages"></div>

</div>

<div class="footer">
Website : www.ctr.go.th | Tel. 044851499
</div>

</div>


<script>

const dept=document.getElementById("dept")
const date=document.getElementById("date")
const detail=document.getElementById("detail")
const images=document.getElementById("images")

const showdept=document.getElementById("showdept")
const showdate=document.getElementById("showdate")
const showdetail=document.getElementById("showdetail")
const showimages=document.getElementById("showimages")

function formatThaiDate(dateStr){

if(!dateStr) return ""

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return "วันที่ "+day+" "+month+" "+year

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)

let paragraphs = detail.value.split("\n")

showdetail.innerHTML=""

paragraphs.forEach(p=>{
if(p.trim()!==""){
showdetail.innerHTML+="<p>"+p+"</p>"
}
})

let files=images.files

if(files.length>9){
alert("อัปโหลดได้ไม่เกิน 9 รูป")
return
}

showimages.innerHTML=""

/* จัด layout รูป */

let count = files.length

if(count==1){
showimages.style.gridTemplateColumns="1fr"
}
else if(count==2){
showimages.style.gridTemplateColumns="1fr 1fr"
}
else if(count==3){
showimages.style.gridTemplateColumns="1fr 1fr 1fr"
}
else if(count==4){
showimages.style.gridTemplateColumns="1fr 1fr"
}
else if(count<=6){
showimages.style.gridTemplateColumns="1fr 1fr 1fr"
}
else{
showimages.style.gridTemplateColumns="1fr 1fr 1fr"
}

for(let i=0;i<files.length;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result
showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}


/* DOWNLOAD รองรับมือถือ */

function download(){

html2canvas(document.querySelector("#poster"),{
scale:4
}).then(canvas=>{

let img = canvas.toDataURL("image/jpeg",1)

if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){

let newTab = document.createElement("a")
newTab.href = img
newTab.target = "_blank"
document.body.appendChild(newTab)
newTab.click()
document.body.removeChild(newTab)

}else{

let link = document.createElement("a")
link.href = img
link.download = "ข่าวประชาสัมพันธ์.jpg"
document.body.appendChild(link)
link.click()
document.body.removeChild(link)

}

})

}

</script>

</body>
</html>
