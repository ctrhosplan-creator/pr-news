<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<style>

body{
font-family:sans-serif;
background:#f4f6fb;
margin:0;
padding:0;
}

/* HEADER */

.header{
background:linear-gradient(120deg,#0d47a1,#1976d2,#42a5f5);
color:white;
padding:35px;
display:flex;
align-items:center;
gap:20px;
position:relative;
overflow:hidden;
}

.header img{
height:70px;
}

.header h1{
margin:0;
font-size:26px;
}

.subtitle{
font-size:14px;
opacity:.9;
}

/* FORM */

.form{
padding:20px;
background:white;
}

input,textarea{
width:100%;
padding:8px;
margin-top:6px;
margin-bottom:12px;
}

button{
padding:10px 18px;
background:#1976d2;
color:white;
border:none;
cursor:pointer;
}

/* RESULT */

#result{
padding:30px;
background:white;
margin:20px;
}

/* BADGE */

.badge{
background:#1976d2;
color:white;
display:inline-block;
padding:6px 14px;
border-radius:20px;
font-size:14px;
margin-bottom:10px;
}

/* TITLE */

.title{
font-size:22px;
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

/* DATE */

.date{
text-align:right;
margin-bottom:20px;
}

/* DEPARTMENT */

.department{
background:#eef4ff;
padding:10px;
border-left:5px solid #1976d2;
margin-bottom:15px;
font-weight:bold;
}

/* CONTENT */

.content{
text-align:left;
line-height:1.7;
font-size:16px;
white-space:pre-line;
}

/* IMAGE GRID */

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">

<img src="moph.png">

<div>

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="form">

<label>หน่วยงาน</label>
<input id="dept">

<label>หัวข้อข่าว</label>
<input id="title">

<label>รายละเอียด</label>
<textarea id="detail"></textarea>

<label>อัปโหลดรูปภาพ (เลือกได้ 9 รูป)</label>
<input type="file" id="images" multiple>

<button onclick="generate()">สร้างข่าว</button>
<button onclick="window.print()">Export A4</button>

</div>

<div id="result"></div>

<script>

function thaiDate(){

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date()

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return day+" "+month+" "+year

}

function generate(){

let dept=document.getElementById("dept").value
let title=document.getElementById("title").value
let detail=document.getElementById("detail").value
let files=document.getElementById("images").files

let html=""

html+="<div class='badge'>ข่าวประชาสัมพันธ์</div>"

html+="<div class='title'>"+title+"</div>"

html+="<div class='date'>"+thaiDate()+"</div>"

html+="<div class='department'>"+dept+"</div>"

html+="<div class='content'>"+detail+"</div>"

html+="<div class='gallery'>"

for(let i=0;i<files.length && i<9;i++){

let url=URL.createObjectURL(files[i])

html+="<img src='"+url+"'>"

}

html+="</div>"

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
