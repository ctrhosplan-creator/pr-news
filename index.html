<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบสร้างข่าวประชาสัมพันธ์</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family:Tahoma;
margin:0;
padding:15px;
background:#eef3fb;
}

/* ฟอร์ม */

.formbox{
background:white;
max-width:900px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#1565c0;
color:white;
border:none;
padding:12px 18px;
border-radius:6px;
cursor:pointer;
margin-right:10px;
font-size:16px;
}

/* โปสเตอร์ */

.poster{
max-width:900px;
width:100%;
margin:auto;
background:white;
border-radius:10px;
overflow:hidden;
}

/* แบนเนอร์ */

.header{

background:
radial-gradient(circle at 20% 30%,rgba(255,255,255,0.25) 0%,transparent 40%),
radial-gradient(circle at 80% 20%,rgba(255,255,255,0.15) 0%,transparent 40%),
linear-gradient(120deg,#0d47a1,#1976d2,#42a5f5);

color:white;
padding:30px;
display:flex;
align-items:center;
gap:20px;
position:relative;
overflow:hidden;

}

/* วงกลม */

.header:before{

content:"";
position:absolute;
width:300px;
height:300px;
background:rgba(255,255,255,0.08);
border-radius:50%;
top:-120px;
right:-80px;

}

.header:after{

content:"";
position:absolute;
width:200px;
height:200px;
background:rgba(255,255,255,0.08);
border-radius:50%;
bottom:-100px;
left:-60px;

}

/* เส้นเฉียง */

.shape{
position:absolute;
width:120%;
height:80px;
background:rgba(255,255,255,0.08);
transform:rotate(-8deg);
top:50px;
left:-40px;
}

/* ลายจุด */

.dots{

position:absolute;
right:60px;
bottom:20px;
width:140px;
height:80px;

background-image:radial-gradient(rgba(255,255,255,0.4) 2px, transparent 2px);
background-size:16px 16px;

opacity:.6;

}

.header img{
height:70px;
z-index:2;
}

.header-text{
z-index:2;
}

.header h1{
margin:0;
font-size:26px;
}

.subtitle{
font-size:14px;
opacity:.9;
}

/* title */

.titlebar{
background:#0d47a1;
color:white;
font-size:28px;
font-weight:bold;
padding:10px 25px;
}

/* meta */

.meta{
text-align:center;
padding:10px;
color:#0d47a1;
}

#showdept{
font-size:20px;
font-weight:bold;
}

#showdate{
font-size:18px;
margin-top:5px;
}

/* content */

.content{
padding:0 25px 20px 25px;
font-size:18px;
line-height:1.6;
text-align:center;
white-space:pre-line;
}

/* images */

.images{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:20px;
}

.images img{
width:100%;
height:180px;
object-fit:cover;
border-radius:6px;
}

/* footer */

.footer{
background:linear-gradient(90deg,#1e88e5,#42a5f5);
color:white;
padding:12px;
text-align:center;
font-size:15px;
}

/* มือถือ */

@media(max-width:600px){

.header{
flex-direction:column;
text-align:center;
}

.images{
grid-template-columns:repeat(2,1fr);
}

.images img{
height:150px;
}

}

</style>

</head>

<body>

<div class="formbox">

<h3>กรอกข้อมูลข่าวประชาสัมพันธ์</h3>

<label>หน่วยงาน</label>
<input type="text" id="dept">

<label>วันที่กิจกรรม</label>
<input type="date" id="date">

<label>รายละเอียดข่าว</label>
<textarea id="detail"></textarea>

<label>รูปภาพกิจกรรม (สูงสุด 9 รูป)</label>
<input type="file" id="images" multiple accept="image/*" capture="environment">

<button onclick="generate()">สร้างข่าว</button>
<button onclick="download()">ดาวน์โหลด JPG</button>

</div>

<div id="poster" class="poster">

<div class="header">

<div class="shape"></div>
<div class="dots"></div>

<img src="moph.png">

<div class="header-text">

<h1>โรงพยาบาลจัตุรัส จังหวัดชัยภูมิ</h1>

<div class="subtitle">
โรงพยาบาลชุมชนแม่ข่าย บริการมีคุณภาพ เครือข่ายมีส่วนร่วม เป็นองค์กรแห่งความสุข
</div>

</div>

</div>

<div class="titlebar">
ข่าวประชาสัมพันธ์
</div>

<div class="meta">

<div id="showdept"></div>
<div id="showdate"></div>

</div>

<div class="content" id="showdetail"></div>

<div class="images" id="showimages"></div>

<div class="footer">
www.ctrhos.go.th | โทร 044-851499
</div>

</div>

<script>

function formatThaiDate(dateStr){

if(!dateStr) return ""

const months=[
"มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
"กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
]

let d=new Date(dateStr)

let day=d.getDate()
let month=months[d.getMonth()]
let year=d.getFullYear()+543

return "วันที่ "+day+" "+month+" "+year

}

function generate(){

showdept.innerText="หน่วยงาน : "+dept.value
showdate.innerText=formatThaiDate(date.value)

let text = detail.value
text = text.replace(/^- /gm,"• ")

showdetail.innerText = text

let files=images.files

if(files.length>9){
alert("เลือกรูปได้สูงสุด 9 รูป")
return
}

showimages.innerHTML=""

for(let i=0;i<files.length;i++){

let reader=new FileReader()

reader.onload=function(e){

let img=document.createElement("img")
img.src=e.target.result

showimages.appendChild(img)

}

reader.readAsDataURL(files[i])

}

}

function download(){

html2canvas(document.querySelector("#poster"),{scale:4}).then(canvas=>{

let link=document.createElement("a")

link.download="ข่าวประชาสัมพันธ์.jpg"

link.href=canvas.toDataURL("image/jpeg")

link.click()

})

}

</script>

</body>
</html>
